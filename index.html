<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vườn Hoa Tương Tác</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 30%, #1a3a5c 0%, #0d2137 50%, #060e1a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    font-family: 'Playfair Display', Georgia, serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ============================================================ */
  /* 0. CSS MÀN HÌNH CHỜ (ĐỂ BẬT NHẠC) */
  /* ============================================================ */
  #start-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background-color: rgba(6, 14, 26, 0.95);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #FFE566;
    cursor: pointer;
    transition: opacity 1s ease, visibility 1s;
    backdrop-filter: blur(5px);
  }

  #start-overlay h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255, 200, 0, 0.5);
  }

  #start-overlay p {
    font-size: 1rem;
    font-style: italic;
    opacity: 0.8;
    animation: blinkText 1.5s infinite;
  }

  @keyframes blinkText {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.2; }
  }

  /* ============================================================ */
  /* 1. CSS CHO HOA HƯỚNG DƯƠNG */
  /* ============================================================ */
  .sunflower-wrapper {
    position: absolute;
    bottom: 0;
    left: var(--left, 50%);
    transform: translateX(-50%) scale(var(--scale, 1));
    transform-origin: bottom center;
    width: 480px;
    height: 700px;
  }

  .glow {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,0,0.18) 0%, rgba(255,160,0,0.06) 50%, transparent 70%);
    animation: pulse 4s ease-in-out infinite, bloomGlow 1.5s ease-out forwards;
    animation-delay: var(--delay, 0s), calc(var(--delay, 0s) + 3s); 
    pointer-events: none;
    opacity: 0;
  }

  @keyframes pulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.08); opacity: 0.8; }
  }
  @keyframes bloomGlow { to { opacity: 1; } }

  svg.flower {
    width: 100%;
    height: 100%;
    overflow: visible; 
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  }

  .petal { animation: shimmer 3s ease-in-out infinite; }
  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.88; }
  }

  .clickable-petal {
    cursor: pointer;
    transition: filter 0.2s ease, transform 0.2s ease;
  }
  .clickable-petal:hover {
    filter: brightness(1.3) drop-shadow(0 0 10px #FFC800);
  }

  .title {
    position: absolute;
    bottom: 80px; 
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,220,100,0.85);
    font-size: 14px;
    font-style: italic;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0; 
    animation: fadeInTitle 1.5s ease forwards 4s;
    white-space: nowrap;
    z-index: 1000;
    pointer-events: none;
  }

  @keyframes fadeInTitle { to { opacity: 0.7; } }

  @keyframes drawStem { to { stroke-dashoffset: 0; } }
  .stem {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: drawStem 2.5s ease-out forwards;
    animation-delay: var(--delay, 0s);
  }

  @keyframes leafGrow {
    from { opacity: 0; transform: scale(0); }
    to { opacity: 1; transform: scale(1); }
  }

  .leaf-pair-2 { transform-origin: 230px 490px; animation: leafGrow 0.8s ease-out forwards; animation-delay: calc(var(--delay, 0s) + 1.4s); opacity: 0; }
  .leaf-pair-3 { transform-origin: 231px 374px; animation: leafGrow 0.8s ease-out forwards; animation-delay: calc(var(--delay, 0s) + 1.8s); opacity: 0; }
  .calyx-leaves {
    opacity: 0;
    animation: leafGrow 0.8s ease-out forwards;
    animation-delay: calc(var(--delay, 0s) + 2.3s);
    transform-origin: 240px 248px;
  }

  @keyframes bloom {
    from { opacity: 0; transform: scale(0) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .flower-head {
    transform-origin: 0px 0px; 
    animation: bloom 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    animation-delay: calc(var(--delay, 0s) + 2.5s); 
    opacity: 0;
  }


  /* ============================================================ */
  /* 2. CSS CHO HOA MÀU HỒNG */
  /* ============================================================ */
  .pink-wrapper {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pink-stem {
    width: 4px;
    background: linear-gradient(to top, #166534, #22c55e);
    border-radius: 2px;
    height: 0; 
    animation: growPinkStem 2s ease-in-out forwards;
    transform-origin: bottom center; 
  }

  @keyframes growPinkStem {
    0% { height: 0; }
    100% { height: var(--stem-height, 150px); }
  }

  .pink-flower-head {
    position: relative;
    width: 30px;
    height: 30px;
    opacity: 0;
    transform: scale(0);
    animation: bloomPink 1s ease-out forwards;
  }

  @keyframes bloomPink {
    0% { opacity: 0; transform: scale(0) translateY(10px); }
    80% { opacity: 1; transform: scale(1.1) translateY(0); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .pink-petal {
    position: absolute;
    width: 14px;
    height: 24px;
    background: #ec4899; 
    border-radius: 50%;
    top: 0;
    left: 8px;
    transform-origin: bottom center;
    box-shadow: 0 0 10px rgba(236, 72, 153, 0.6); 
  }

  .pink-petal:nth-child(1) { transform: rotate(0deg); }
  .pink-petal:nth-child(2) { transform: rotate(72deg); }
  .pink-petal:nth-child(3) { transform: rotate(144deg); }
  .pink-petal:nth-child(4) { transform: rotate(216deg); }
  .pink-petal:nth-child(5) { transform: rotate(288deg); }

  .pink-center {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #fbbf24; 
    border-radius: 50%;
    top: 8px;
    left: 8px;
    z-index: 2;
    box-shadow: 0 0 8px rgba(251, 191, 36, 0.8);
  }

  /* ============================================================ */
  /* 3. CSS CHO HỘP THÔNG ĐIỆP */
  /* ============================================================ */
  #message-modal {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    background: rgba(6, 14, 26, 0.8); 
    z-index: 9999; 
    justify-content: center; 
    align-items: center;
    backdrop-filter: blur(3px);
  }

  .message-box {
    background: radial-gradient(ellipse at center, #1a3a5c 0%, #0d2137 100%);
    padding: 40px; 
    border-radius: 15px; 
    color: #FFE566; 
    text-align: center; 
    max-width: 80%;
    width: 400px;
    border: 2px solid #C97A00;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(255,200,0,0.2);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .message-box p {
    margin-bottom: 30px; 
    font-size: 20px; 
    line-height: 1.6;
  }

  .message-box button {
    padding: 10px 30px; 
    background: #C97A00; 
    color: #fff; 
    border: none; 
    border-radius: 8px; 
    cursor: pointer; 
    font-family: 'Playfair Display', serif; 
    font-size: 16px;
    transition: background 0.3s;
  }

  .message-box button:hover {
    background: #FFC800;
    color: #0d2137;
    font-weight: bold;
  }

  /* ============================================================ */
  /* 4. CSS CHO TRÁI TIM BAY & NỔ BONG BÓNG */
  /* ============================================================ */
  .heart-container {
    position: absolute;
    bottom: -50px;
    z-index: 5;
    animation: floatUp var(--duration) linear forwards;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); }
    80% { transform: translateY(var(--target-y)); }
    100% { transform: translateY(calc(var(--target-y) - 5vh)); }
  }

  .heart-shape {
    position: absolute;
    top: -7.5px; left: -7.5px;
    width: 15px;
    height: 15px;
    background-color: #ff7675;
    transform: rotate(-45deg) scale(var(--scale));
    animation: popShape var(--duration) linear forwards;
    box-shadow: 0 0 15px rgba(255, 118, 117, 0.6);
  }

  .heart-shape::before,
  .heart-shape::after {
    content: '';
    position: absolute;
    width: 15px;
    height: 15px;
    background-color: #ff7675;
    border-radius: 50%;
  }
  .heart-shape::before { top: -7.5px; left: 0; }
  .heart-shape::after { top: 0; left: 7.5px; }

  @keyframes popShape {
    0% { opacity: 0; transform: rotate(-45deg) scale(var(--scale)); }
    10% { opacity: var(--opacity); transform: rotate(-45deg) scale(var(--scale)); }
    75% { opacity: 1; transform: rotate(-45deg) scale(var(--scale)); } 
    80% { opacity: 1; transform: rotate(-45deg) scale(calc(var(--scale) * 1.2)); } 
    85% { opacity: 0; transform: rotate(-45deg) scale(calc(var(--scale) * 2)); } 
    100% { opacity: 0; transform: rotate(-45deg) scale(calc(var(--scale) * 2)); }
  }

  .heart-ring {
    position: absolute;
    top: 0; left: 0;
    width: 30px; height: 30px;
    margin-top: -15px; margin-left: -15px;
    border: 2px solid #ff7675;
    border-radius: 50%;
    box-shadow: 0 0 10px #ff7675;
    animation: popRing var(--duration) linear forwards;
  }

  @keyframes popRing {
    0%, 79% { opacity: 0; transform: translateY(-3px) scale(0); } 
    80% { opacity: 0.8; transform: translateY(-3px) scale(var(--scale)); border-width: 3px; } 
    85% { opacity: 0; transform: translateY(-3px) scale(calc(var(--scale) * 2.5)); border-width: 1px; } 
    100% { opacity: 0; transform: translateY(-3px) scale(calc(var(--scale) * 2.5)); }
  }

</style>
</head>

<script>
  // Kho thông điệp ngẫu nhiên
  const messages = [

    const bgMusic = document.getElementById('bgMusic');

    // XỬ LÝ CLICK ĐỂ BẬT NHẠC
    startOverlay.addEventListener('click', () => {
      // Ẩn màn hình chờ
      startOverlay.style.opacity = '0';
      setTimeout(() => {
        startOverlay.style.visibility = 'hidden';
      }, 1000);

      // Phát nhạc nền
      bgMusic.play().catch((error) => {
        console.log("Trình duyệt vẫn chặn nhạc:", error);
      });
    });
    
    // --- 1. Tạo 1 bông Hướng Dương to ở giữa ---
    const mainFlowerTemplate = document.getElementById('main-flower').innerHTML;
    const bigFlower = document.createElement('div');
    bigFlower.className = 'sunflower-wrapper';
    bigFlower.innerHTML = mainFlowerTemplate;
    bigFlower.style.setProperty('--left', '50%');
    bigFlower.style.setProperty('--scale', 1);
    bigFlower.style.setProperty('--delay', '0s');
    bigFlower.style.zIndex = 100;
    garden.appendChild(bigFlower);

    // --- XỬ LÝ CLICK CÁNH HOA LỚN ---
    const modal = document.getElementById('message-modal');
    const msgText = document.getElementById('message-text');
    const closeBtn = document.getElementById('close-btn');
    let activePetal = null;

    const bigPetals = bigFlower.querySelectorAll('.target-petals ellipse');
    
    bigPetals.forEach(petal => {
      petal.classList.add('clickable-petal');
      
      petal.addEventListener('click', function(e) {
        if(activePetal) return; 
        
        activePetal = this;
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        msgText.innerText = randomMsg;
        modal.style.display = 'flex';
      });
    });

    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
      
      if(activePetal) {
        let currentTransform = activePetal.getAttribute('transform') || '';
        currentTransform = currentTransform.replace(/rotate\(([-+]?[0-9]*\.?[0-9]+)\)/g, 'rotate($1deg)');
        
        const dropX = (Math.random() - 0.5) * 120; 
        const dropY = 600 + Math.random() * 50;    
        const extraRotate = (Math.random() - 0.5) * 90; 

        activePetal.animate([
          { transform: `translate(0px, 0px) ${currentTransform}` },
          { transform: `translate(${dropX}px, ${dropY}px) ${currentTransform} rotate(${extraRotate}deg)` }
        ], {
          duration: 1500 + Math.random() * 500, 
          easing: 'cubic-bezier(0.55, 0.085, 0.68, 0.53)', 
          fill: 'forwards' 
        });

        activePetal.classList.remove('clickable-petal');
        activePetal.style.pointerEvents = 'none';

        activePetal = null;
      }
    });

    // --- 2. Tạo 10 bông Hướng Dương nhỏ xung quanh ---
    for (let i = 0; i < 10; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'sunflower-wrapper';
      wrapper.innerHTML = mainFlowerTemplate;

      const leftPosition = Math.random() * 90 + 5; 
      const scale = Math.random() * 0.3 + 0.15;
      const delay = Math.random() * 3 + 0.5;
      const zIndex = Math.floor(scale * 100);

      wrapper.style.setProperty('--left', `${leftPosition}%`);
      wrapper.style.setProperty('--scale', scale);
      wrapper.style.setProperty('--delay', `${delay}s`);
      wrapper.style.zIndex = zIndex;

      const smallPetals = wrapper.querySelectorAll('.target-petals ellipse');
      smallPetals.forEach(p => p.classList.remove('clickable-petal'));

      garden.appendChild(wrapper);
    }

    // --- 3. Tạo 15 bông hoa màu hồng ---
    for (let i = 0; i < 15; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'pink-wrapper';

      const leftPosition = Math.random() * 96 + 2; 
      const stemHeight = Math.random() * 120 + 40; 
      const animDelay = Math.random() * 3 + 1; 
      const zIndex = Math.floor(Math.random() * 50) + 20; 

      wrapper.style.left = `${leftPosition}%`;
      wrapper.style.zIndex = zIndex;
      
      wrapper.innerHTML = `
        <div class="pink-flower-head" style="animation-delay: ${animDelay + 1.5}s;">
            <div class="pink-petal"></div>
            <div class="pink-petal"></div>
            <div class="pink-petal"></div>
            <div class="pink-petal"></div>
            <div class="pink-petal"></div>
            <div class="pink-center"></div>
        </div>
        <div class="pink-stem" style="--stem-height: ${stemHeight}px; animation-delay: ${animDelay}s;"></div>
      `;
      garden.appendChild(wrapper);
    }

    // --- 4. TẠO TRÁI TIM BAY VÀ PHÁT NỔ BONG BÓNG ---
    function spawnHeart() {
      const container = document.createElement('div');
      container.className = 'heart-container';
      
      const size = Math.random() * 0.7 + 0.5;
      const left = Math.random() * 100;
      const duration = Math.random() * 2.5 + 3.5; 
      const opacity = Math.random() * 0.6 + 0.3; 
      
      const targetY = -(Math.random() * 20 + 40); 
      
      container.style.setProperty('--scale', size);
      container.style.setProperty('--opacity', opacity);
      container.style.setProperty('--target-y', `${targetY}vh`);
      container.style.setProperty('--duration', `${duration}s`);
      
      container.style.left = `${left}vw`;
      
      container.innerHTML = `
        <div class="heart-shape"></div>
        <div class="heart-ring"></div>
      `;
      
      garden.appendChild(container);
      
      setTimeout(() => {
        container.remove();
      }, duration * 1000);
    }

    setInterval(spawnHeart, 400);

  });
</script>

</body>
</html>
